name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust (with universal target on macOS)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Second Brain ${{ github.ref_name }}
          releaseBody: |
            ## ダウンロード
            - **Mac**: `.dmg` ファイルをダウンロードしてインストール（Intel/Apple Silicon両対応）
            - **Windows**: `.msi` または `.exe` をダウンロードしてインストール

            ### Macで「開発元を確認できないため開けません」と出る場合
            初回起動時はFinderで `.app` を **右クリック → 開く** を選択してください。
            または、ターミナルで以下を実行：
            ```
            xattr -cr /Applications/Second\ Brain.app
            ```
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
